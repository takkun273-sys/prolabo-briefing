<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a3a5c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="申し送り">
<title>申し送りシステム｜プロラボ加古川校</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-icon">📋</span>
      <div>
        <div class="login-title">申し送りシステム</div>
        <div class="login-sub">プロラボ加古川校</div>
      </div>
    </div>
    <div class="field">
      <label>スタッフ名</label>
      <select id="login-name"><option value="">選択してください</option></select>
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="パスワードを入力">
    </div>
    <div class="error-msg" id="login-error"></div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-note" id="login-note"></div>
  </div>
</div>

<!-- メイン -->
<div id="main-screen" class="hidden">
  <div class="header">
    <div>
      <div class="header-title">申し送り記録</div>
      <div class="header-sub" id="main-date-label"></div>
    </div>
    <div class="header-right">
      <span class="staff-badge" id="main-staff-name"></span>
      <button class="icon-btn" onclick="openHistory()">📂 履歴</button>
      <button class="icon-btn" onclick="openChildList()">👦 児童別</button>
      <button class="icon-btn icon-btn-admin hidden" id="admin-btn" onclick="openAdmin()">⚙️ 設定</button>
      <button class="icon-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- 全体共有欄 -->
  <div id="notice-bar">
    <div class="notice-header" onclick="toggleNotice()">
      <span>📢 全体共有欄</span>
      <span id="notice-arrow">▼</span>
    </div>
    <div class="notice-body hidden" id="notice-body">
      <!-- 伝達事項 -->
      <div class="notice-section">
        <div class="notice-section-label">📌 伝達事項</div>
        <div class="log-box" id="notice-log-msg"></div>
        <div class="textarea-row">
          <textarea id="notice-input-msg" rows="2" placeholder="スタッフへの伝達事項を入力"></textarea>
          <button class="mic-btn" title="音声入力"
            onpointerdown="startMic(this,'notice-input-msg')"
            onpointerup="stopMic()"
            onpointerleave="stopMic()">🎤</button>
        </div>
        <button class="append-btn" onclick="appendNotice('msg')">✏️ 追記する</button>
      </div>
      <!-- 来客予定 -->
      <div class="notice-section" style="margin-top:12px">
        <div class="notice-section-label">🚪 来客予定</div>
        <div class="log-box" id="notice-log-visitor"></div>
        <div class="textarea-row">
          <textarea id="notice-input-visitor" rows="2" placeholder="来客・外部機関訪問の予定を入力"></textarea>
          <button class="mic-btn" title="音声入力"
            onpointerdown="startMic(this,'notice-input-visitor')"
            onpointerup="stopMic()"
            onpointerleave="stopMic()">🎤</button>
        </div>
        <button class="append-btn" onclick="appendNotice('visitor')">✏️ 追記する</button>
      </div>
    </div>
  </div>

  <!-- 引継ぎ完了フラグ -->
  <div id="handover-bar">
    <div class="handover-status" id="handover-status"></div>
    <button class="handover-btn" id="handover-btn" onclick="toggleHandover()"></button>
  </div>

  <div class="card-list" id="card-list"></div>
  <div class="save-bar">
    <button class="save-btn" id="save-btn" onclick="saveRecords()">💾 保存する</button>
  </div>
</div>

<!-- 履歴 -->
<div id="history-screen" class="hidden">
  <div class="header">
    <div class="header-title">📂 過去の記録</div>
    <button class="icon-btn" onclick="showScreen('main')">← 戻る</button>
  </div>
  <div class="card-list" id="history-list"></div>
</div>

<!-- 詳細 -->
<div id="detail-screen" class="hidden">
  <div class="header">
    <div>
      <div class="header-title">📋 記録詳細</div>
      <div class="header-sub" id="detail-date-label"></div>
    </div>
    <div class="header-right">
      <button class="print-btn" onclick="printDetail()">🖨️ 印刷</button>
      <button class="icon-btn" onclick="showScreen('history')">← 戻る</button>
    </div>
  </div>
  <div class="card-list" id="detail-list"></div>
</div>

<!-- 児童一覧 -->
<div id="childlist-screen" class="hidden">
  <div class="header">
    <div class="header-title">👦 児童別記録</div>
    <button class="icon-btn" onclick="showScreen('main')">← 戻る</button>
  </div>
  <div class="card-list" id="childlist-list"></div>
</div>

<!-- 児童個人ページ -->
<div id="childpage-screen" class="hidden">
  <div class="header">
    <div>
      <div class="header-title" id="childpage-title"></div>
      <div class="header-sub">過去の申し送り一覧</div>
    </div>
    <div class="header-right">
      <button class="print-btn" onclick="printChildPage()">🖨️ 印刷</button>
      <button class="icon-btn" onclick="showScreen('childlist')">← 戻る</button>
    </div>
  </div>
  <div class="card-list" id="childpage-list"></div>
</div>

<!-- 管理者設定 -->
<div id="admin-screen" class="hidden">
  <div class="header">
    <div class="header-title">⚙️ 管理者設定</div>
    <button class="icon-btn" onclick="showScreen('main')">← 戻る</button>
  </div>
  <div class="card-list" id="admin-content"></div>
</div>

<!-- 月次まとめ -->
<div id="monthly-screen" class="hidden">
  <div class="header">
    <div>
      <div class="header-title">📊 月次まとめ</div>
      <div class="header-sub" id="monthly-label"></div>
    </div>
    <div class="header-right">
      <button class="print-btn" onclick="printMonthly()">🖨️ 印刷</button>
      <button class="icon-btn" onclick="showScreen('history')">← 戻る</button>
    </div>
  </div>
  <div class="card-list" id="monthly-list"></div>
</div>

<!-- 印刷専用エリア -->
<div id="print-area" style="display:none"></div>

<script src="app.js"></script>
</body>
</html>
